# Development profile (local)

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_parking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=Naman@10807
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS (Vite frontend)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Dev helpers
app.seed-default-users=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false

# Actuator (dev)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
