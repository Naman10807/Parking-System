# Base configuration (overridden by profile-specific files)
spring.application.name=smart-parking-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server (Render/Railway inject PORT)
server.port=${PORT:8081}
server.error.include-message=always
server.error.include-binding-errors=always

# JPA defaults
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT (override in production via environment variables)
jwt.secret=${JWT_SECRET:dev-only-change-this-secret-key-in-production-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# Application
app.seed-default-users=${SEED_DEFAULT_USERS:false}

# SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.parking.controller
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
