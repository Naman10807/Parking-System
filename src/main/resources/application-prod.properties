# Production profile

# MySQL via environment variables (Render / Railway)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_parking_db}?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (production tuning)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate — use validate or none in production after schema is stable
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Security — JWT secret MUST be set in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS — set your deployed frontend URL(s), comma-separated
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Do not seed default users in production unless explicitly enabled
app.seed-default-users=${SEED_DEFAULT_USERS:false}

# Disable Swagger UI in production (API docs optional)
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_API_DOCS_ENABLED:false}

# Actuator (health checks for load balancers)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator
management.health.db.enabled=true

# Production logging
logging.level.root=INFO
logging.level.com.parking=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
